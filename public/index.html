<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">🔐 MonProjet</div>
    <div class="nav-user">
      <span id="nav-username">Chargement...</span>
      <span id="nav-role" class="badge"></span>
      <button class="btn btn-outline btn-sm" id="logout-btn">Déconnexion</button>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Tableau de bord</h1>
      <p id="welcome-msg">Bienvenue !</p>
    </div>

    <div class="cards-grid">

      <!-- Carte visible par tous -->
      <div class="card">
        <div class="card-icon">📄</div>
        <h2>Données publiques</h2>
        <p>Accessible à tous les utilisateurs connectés.</p>
        <button class="btn btn-primary" id="btn-read">Lire les données</button>
        <div id="read-result" class="result-box" style="display:none;"></div>
      </div>

      <!-- Carte admin seulement -->
      <div class="card" id="card-admin" style="display:none;">
        <div class="card-icon">⚙️</div>
        <h2>Zone Admin</h2>
        <p>Réservée aux administrateurs.</p>
        <button class="btn btn-danger" id="btn-create">Créer une donnée</button>
        <div id="create-result" class="result-box" style="display:none;"></div>
      </div>

    </div>

    <!-- Bloc infos session -->
    <div class="card mt-2">
      <h2>Vos informations</h2>
      <div id="user-info" class="info-grid"></div>
    </div>

  </main>

  <script>
    let currentUser = null;

    async function init() {
      const res = await fetch('/auth/me');
      const data = await res.json();

      if (!data.success) {
        window.location.href = '/login.html';
        return;
      }

      currentUser = data.user;

      // Navbar
      document.getElementById('nav-username').textContent = currentUser.username;
      const roleBadge = document.getElementById('nav-role');
      roleBadge.textContent = currentUser.role;
      roleBadge.className = `badge badge-${currentUser.role === 'admin' ? 'admin' : 'default'}`;

      // Message de bienvenue
      document.getElementById('welcome-msg').textContent =
        `Connecté en tant que ${currentUser.username} — Rôle : ${currentUser.role}`;

      // Afficher la zone admin si permission create
      if (currentUser.permissions.includes('create')) {
        document.getElementById('card-admin').style.display = 'flex';
      }

      // Infos session
      document.getElementById('user-info').innerHTML = `
        <div class="info-item"><span>ID</span><strong>${currentUser.id}</strong></div>
        <div class="info-item"><span>Utilisateur</span><strong>${currentUser.username}</strong></div>
        <div class="info-item"><span>Rôle</span><strong>${currentUser.role}</strong></div>
        <div class="info-item"><span>Permissions</span><strong>${currentUser.permissions.join(', ')}</strong></div>
      `;
    }

    document.getElementById('btn-read').addEventListener('click', async () => {
      const res = await fetch('/api/data');
      const data = await res.json();
      const box = document.getElementById('read-result');
      box.textContent = data.success ? data.data : data.message;
      box.style.display = 'block';
    });

    document.getElementById('btn-create').addEventListener('click', async () => {
      const res = await fetch('/api/data', { method: 'POST' });
      const data = await res.json();
      const box = document.getElementById('create-result');
      box.textContent = data.success ? data.message : data.message;
      box.style.display = 'block';
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    init();
  </script>
</body>
</html>
